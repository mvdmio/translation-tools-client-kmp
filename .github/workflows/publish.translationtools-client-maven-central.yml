name: "Publish TranslationTools Client (Maven Central)"

on:
   workflow_dispatch:
   push:
      branches:
      - master
      paths:
      - "**"

jobs:
   Publish_TranslationTools_Client_Kmp:
      runs-on: ubuntu-22.04
      permissions:
         contents: read

      steps:
      -  uses: actions/checkout@v4
         with:
            fetch-depth: 0

      -  name: Make Gradle wrapper executable
         run: chmod +x ./gradlew

      -  name: Setup Java
         uses: actions/setup-java@v4
         with:
            distribution: temurin
            java-version: '17'

      -  name: Setup Android SDK
         uses: android-actions/setup-android@v3

      -  name: Accept Android SDK licenses and install platform
         run: |
            yes | sdkmanager --licenses
            sdkmanager "platforms;android-36" "build-tools;34.0.0"

      -  name: Setup Gradle cache
         uses: gradle/actions/setup-gradle@v4

      -  name: Build and test KMP client
         env:
            ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
            ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
         run: ./gradlew compileDebugKotlinAndroid jvmTest

      -  name: Publish package to Maven Central
         env:
            ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
            ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
            ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.MAVEN_SIGNING_KEY }}
            ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.MAVEN_SIGNING_PASSPHRASE }}
            ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
            ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
         run: ./gradlew publishAndReleaseToMavenCentral
